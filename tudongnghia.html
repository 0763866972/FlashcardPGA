<!DOCTYPE html>
<html lang="vi" class="light-mode h-full bg-slate-50 text-slate-800">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ Đồng Nghĩa - Premium Practice</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0,0,0,0.05);
        }

        .diff-tooltip {
            animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, -10px) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }
        
        .pulse-border:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand-200 selection:text-brand-900 flex flex-col items-center p-4 md:p-8">

    <div class="w-full max-w-4xl flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
        <h1 class="text-2xl font-black text-slate-800"><i class="fa-solid fa-link text-brand-500 mr-2"></i> Từ Đồng Nghĩa</h1>
        <div class="flex items-center gap-3">
            <button onclick="toggleStarFilter()" id="starFilterBtn" class="hidden px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-amber-50 hover:text-amber-600 hover:border-amber-200 shadow-sm transition items-center">
                <i class="fa-regular fa-star mr-1.5" id="starFilterIcon"></i> <span id="starFilterText">Học tất cả</span>
            </button>
            <a href="index.html" class="px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50 shadow-sm transition whitespace-nowrap"><i class="fa-solid fa-house mr-1"></i> Trang chủ</a>
        </div>
    </div>

    <!-- Màn hình Nhập Dữ Liệu -->
    <div id="setupScreen" class="w-full max-w-4xl bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <h2 class="text-xl font-bold text-slate-700 flex items-center">
                <i class="fa-solid fa-list-ul mr-3 text-brand-500"></i>Danh sách từ đồng nghĩa
            </h2>
            <div class="flex items-center gap-2">
                <button onclick="toggleSetupMode()" id="setupToggleBtn" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition flex items-center shadow-inner text-sm">
                    <i class="fa-solid fa-pen-to-square mr-2"></i> Chỉnh sửa
                </button>
                <button onclick="checkSpelling()" id="spellcheckBtn" class="text-sm bg-rose-600 hover:bg-rose-500 text-white shadow-[0_4px_12px_rgba(225,29,72,0.2)] px-3 py-2 rounded-xl transition-all font-bold flex items-center shrink-0 w-fit">
                    <i class="fa-solid fa-spell-check mr-1.5"></i> <span id="spellcheckBtnText">Soát lỗi</span>
                </button>
            </div>
        </div>
        
        <!-- Table Mode -->
        <div id="setupTableView" class="w-full mb-4">
            <div class="overflow-x-auto rounded-xl border border-slate-200 max-h-[500px] overflow-y-auto bg-slate-50 relative">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead class="sticky top-0 bg-slate-100 z-10 shadow-sm">
                        <tr class="border-b border-slate-200 text-slate-600 text-sm">
                            <th class="p-4 font-bold w-12 text-center">#</th>
                            <th class="p-4 font-bold">Từ Đồng Nghĩa</th>
                            <th class="p-4 font-bold">Nghĩa Tiếng Việt</th>
                            <th class="p-4 font-bold w-24 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="setupTableBody" class="text-slate-700 text-sm bg-white">
                        <tr><td colspan="4" class="p-8 text-center text-slate-400">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Edit Mode -->
        <div id="setupEditView" class="w-full hidden mb-4">
            <p class="text-sm text-slate-500 mb-3">Định dạng: <code>từ 1 = từ 2 (loại từ) = từ 3 : Nghĩa tiếng việt</code></p>
            <textarea id="rawData" spellcheck="false" lang="en" rows="10" class="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 text-slate-700 font-mono text-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition" placeholder="enable (v) sb/ sth to do sth = allow = permit = approve : cho phép&#10;fast = quick = rapid : nhanh"></textarea>
            
            <div id="spellSuggestions" class="hidden mt-3 p-3 bg-rose-50/50 border border-rose-200 rounded-xl max-h-48 overflow-y-auto space-y-2">
                <!-- Suggestions will go here -->
            </div>
        </div>
        
        <button onclick="parseData()" class="mt-2 w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/20 transition-all active:scale-[0.98]">
            <i class="fa-solid fa-rocket mr-2"></i> Bắt đầu học
        </button>
    </div>

    <!-- Màn hình Học -->
    <div id="flashcardScreen" class="w-full max-w-3xl hidden flex flex-col gap-6">
        
        <!-- Controls -->
        <div class="bg-white p-3 sm:p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap items-center justify-center gap-3">
            <button onclick="toggleMode()" id="modeBtn" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 bg-indigo-50 text-indigo-700 font-bold rounded-lg border border-indigo-200 hover:bg-indigo-100 transition min-w-[140px]">
                <i class="fa-solid fa-eye-slash mr-2" id="modeIcon"></i> <span id="modeText" class="whitespace-nowrap">Lật thẻ (Click)</span>
            </button>
            <select id="hintLevel" onchange="changeHint()" class="flex-1 md:flex-none px-3 py-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold text-slate-700 outline-none cursor-pointer hover:border-slate-300 transition min-w-[140px]">
                <option value="0">Không gợi ý</option>
                <option value="1">Gợi ý 1 chữ đầu</option>
                <option value="2">Gợi ý 2 chữ đầu</option>
                <option value="3">Từ đầu tiên + 2 chữ</option>
            </select>

            <button onclick="toggleAutoRead()" id="autoReadBtn" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 bg-white text-slate-600 font-bold rounded-lg border border-slate-200 hover:bg-slate-50 transition shadow-sm active:scale-95 min-w-[140px]">
                <i class="fa-solid fa-volume-high mr-2" id="autoReadIcon"></i> <span class="whitespace-nowrap">Tự động đọc</span>
            </button>
            <button onclick="toggleAutoPlay()" id="autoPlayBtn" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 bg-white text-slate-600 font-bold rounded-lg border border-slate-200 hover:bg-slate-50 transition shadow-sm active:scale-95 min-w-[140px]">
                <i class="fa-solid fa-headphones mr-2" id="autoPlayIcon"></i> <span class="whitespace-nowrap">Rảnh tai</span>
            </button>
        </div>

        <!-- Study Board -->
        <div class="glass-card rounded-[2.5rem] overflow-hidden w-full max-w-5xl mx-auto mt-12 flex flex-col shadow-2xl shadow-brand-500/10">
            
            <!-- Header (Nghĩa Tiếng Việt) -->
            <div class="bg-white/60 px-8 py-6 relative border-b border-white/50 flex flex-col items-center justify-center">
                <button onclick="toggleStarCard()" class="absolute top-4 left-6 w-10 h-10 rounded-full hover:bg-white/80 text-slate-400 hover:text-amber-500 flex items-center justify-center transition-all shadow-sm" title="Đánh dấu sao">
                    <i id="cardStarIcon" class="fa-regular fa-star text-lg"></i>
                </button>
                <div class="absolute top-4 right-6 flex items-center gap-2 z-20">
                    <div class="relative flex items-center justify-center">
                        <button onclick="showDeleteCardConfirm(event)" id="cardDeleteBtn" class="w-10 h-10 rounded-full hover:bg-white/80 text-slate-400 hover:text-rose-500 flex items-center justify-center transition-all shadow-sm" title="Xóa thẻ này khỏi danh sách">
                            <i class="fa-solid fa-trash-can text-lg"></i>
                        </button>

                        <!-- Delete Confirm Popup moved to end of body to prevent 3D clipping -->
                    </div>
                    <button onclick="toggleCardReveal()" class="w-10 h-10 rounded-full hover:bg-white/80 text-slate-400 hover:text-brand-500 flex items-center justify-center transition-all shadow-sm" title="Ẩn/Hiện">
                        <i id="cardRevealIcon" class="fa-solid fa-eye-slash text-lg"></i>
                    </button>
                </div>
                <div class="text-xs font-bold text-brand-400 tracking-widest uppercase mb-2" id="progressText">1/1</div>
                <h2 id="meaningDisplay" class="text-3xl md:text-4xl font-extrabold bg-gradient-to-br from-rose-500 to-orange-400 bg-clip-text text-transparent text-center leading-tight drop-shadow-sm pb-1">Loading...</h2>
            </div>
            
            <!-- Các từ đồng nghĩa -->
            <div class="p-8 md:p-12 bg-slate-50/50 flex-1 min-h-[250px] flex items-center justify-center">
                <div id="wordsContainer" class="w-full flex flex-wrap justify-center items-start gap-5">
                    <!-- Nội dung render bằng JS -->
                </div>
            </div>
            
            <!-- Controls (Chuyển câu) -->
            <div class="px-8 py-6 bg-white/60 border-t border-white/50 flex justify-between items-center">
                <button onclick="prevCard()" class="px-8 py-3 bg-brand-600 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/30 hover:bg-brand-700 hover:-translate-y-1 transition-all flex items-center">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Câu trước
                </button>
                <button onclick="shuffleCards()" class="p-4 text-slate-400 hover:text-brand-600 bg-white hover:bg-brand-50 rounded-full shadow-sm transition-all active:scale-95" title="Trộn thẻ">
                    <i class="fa-solid fa-shuffle text-xl"></i>
                </button>
                <button onclick="nextCard()" class="px-8 py-3 bg-brand-600 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/30 hover:bg-brand-700 hover:-translate-y-1 transition-all flex items-center">
                    Câu tiếp theo <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Danh sách từ vựng (Khi Đang Học) -->
        <div class="mt-8 bg-white p-4 sm:p-6 rounded-[2rem] shadow-sm border border-slate-200 w-full max-w-5xl mx-auto">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><i class="fa-solid fa-list mr-2 text-brand-500"></i> Danh sách từ đồng nghĩa</h3>
            <div class="overflow-x-auto rounded-xl border border-slate-200">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm">
                            <th class="p-4 font-bold w-12 text-center">#</th>
                            <th class="p-4 font-bold">Từ Đồng Nghĩa</th>
                            <th class="p-4 font-bold">Nghĩa Tiếng Việt</th>
                            <th class="p-4 font-bold w-24 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="studyTableBody" class="text-slate-700 text-sm">
                        <!-- Rendered by JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let synonymsData = [];
        let originalSynonymsData = [];
        let starredLines = JSON.parse(localStorage.getItem('tudongnghia_starred') || "[]");
        let isStarFilter = false;
        let currentIndex = 0;
        let isTypeMode = false;
        let hintLevel = 0; // 0: None, 1: 1 char, 2: 2 chars, 3: First word full + 2 chars
        let isGlobalRevealed = false;
        let isAutoPlaying = false;
        let isAutoReadWord = false;
        let autoPlayInterval = null;
        
        // Cố gắng tải danh sách giọng nói trước (Chrome bug fix)
        let globalVoices = [];
        if ('speechSynthesis' in window) {
            globalVoices = window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                globalVoices = window.speechSynthesis.getVoices();
            };
        }

        let isEditMode = false;
        function toggleSetupMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('setupToggleBtn');
            const tableView = document.getElementById('setupTableView');
            const editView = document.getElementById('setupEditView');
            
            if (isEditMode) {
                btn.innerHTML = '<i class="fa-solid fa-list mr-2"></i> Bảng từ vựng';
                tableView.classList.add('hidden');
                editView.classList.remove('hidden');
            } else {
                btn.innerHTML = '<i class="fa-solid fa-pen-to-square mr-2"></i> Chỉnh sửa';
                editView.classList.add('hidden');
                tableView.classList.remove('hidden');
                silentParseData();
            }
        }

        function silentParseData() {
            const raw = document.getElementById('rawData').value;
            const lines = raw.split('\n');
            originalSynonymsData = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                let lastColon = line.lastIndexOf(':');
                if (lastColon === -1) continue; // Bỏ qua nếu không có nghĩa
                
                let synsPart = line.substring(0, lastColon).trim();
                let meanPart = line.substring(lastColon + 1).trim();
                
                let wordsRaw = synsPart.split('=').map(w => w.trim()).filter(w => w);
                if (wordsRaw.length === 0) continue;
                
                let words = wordsRaw.map(w => {
                    let checkW = w.replace(/\([^)]*\)/g, '').trim().toLowerCase();
                    checkW = checkW.replace(/\s+/g, ' ');
                    return { display: w, check: checkW, revealed: false };
                });
                
                originalSynonymsData.push({
                    meaning: meanPart,
                    words: words,
                    isStarred: starredLines.includes(meanPart)
                });
            }
            renderTable();
        }

        function parseData() {
            silentParseData();
            if (isStarFilter) {
                synonymsData = originalSynonymsData.filter(d => d.isStarred);
            } else {
                synonymsData = [...originalSynonymsData];
            }
            
            if (synonymsData.length > 0) {
                document.getElementById('setupScreen').classList.add('hidden');
                document.getElementById('flashcardScreen').classList.remove('hidden');
                document.getElementById('starFilterBtn').classList.remove('hidden');
                document.getElementById('starFilterBtn').classList.add('flex');
                currentIndex = 0;
                renderCard();
            } else {
                alert("Không tìm thấy dữ liệu hợp lệ! Hãy kiểm tra lại định dạng.");
            }
        }

        function toggleStarFilter() {
            isStarFilter = !isStarFilter;
            const btn = document.getElementById('starFilterBtn');
            const icon = document.getElementById('starFilterIcon');
            const text = document.getElementById('starFilterText');
            
            if (isStarFilter) {
                const filtered = originalSynonymsData.filter(d => d.isStarred);
                if (filtered.length === 0) {
                    alert("Bạn chưa đánh dấu sao câu nào!");
                    isStarFilter = false;
                    return;
                }
                
                btn.classList.replace('bg-white', 'bg-amber-500');
                btn.classList.replace('text-slate-600', 'text-white');
                btn.classList.replace('border-slate-200', 'border-amber-500');
                btn.classList.replace('hover:bg-amber-50', 'hover:bg-amber-600');
                btn.classList.replace('hover:text-amber-600', 'hover:text-white');
                icon.className = "fa-solid fa-star mr-2";
                text.innerText = "Đang học từ đánh sao";
                
                synonymsData = filtered;
                currentIndex = 0;
            } else {
                btn.classList.replace('bg-amber-500', 'bg-white');
                btn.classList.replace('text-white', 'text-slate-600');
                btn.classList.replace('border-amber-500', 'border-slate-200');
                btn.classList.replace('hover:bg-amber-600', 'hover:bg-amber-50');
                btn.classList.replace('hover:text-white', 'hover:text-amber-600');
                icon.className = "fa-regular fa-star mr-2";
                text.innerText = "Học tất cả";
                
                synonymsData = [...originalSynonymsData];
                currentIndex = 0;
            }
            applyGlobalRevealState();
            renderCard();
        }

        function toggleStarCard() {
            if (synonymsData.length === 0) return;
            const current = synonymsData[currentIndex];
            current.isStarred = !current.isStarred;
            
            // Sync with original
            const origItem = originalSynonymsData.find(o => o.meaning === current.meaning);
            if (origItem) origItem.isStarred = current.isStarred;
            
            if (current.isStarred) {
                if (!starredLines.includes(current.meaning)) starredLines.push(current.meaning);
            } else {
                starredLines = starredLines.filter(m => m !== current.meaning);
            }
            localStorage.setItem('tudongnghia_starred', JSON.stringify(starredLines));
            
            if (isStarFilter && !current.isStarred) {
                synonymsData = originalSynonymsData.filter(d => d.isStarred);
                if (synonymsData.length === 0) {
                    toggleStarFilter(); // toggle back
                    return;
                }
                if (currentIndex >= synonymsData.length) currentIndex = synonymsData.length - 1;
            }
            
            renderCard();
            renderTable();
        }

        function renderTable() {
            const setupTbody = document.getElementById('setupTableBody');
            const studyTbody = document.getElementById('studyTableBody');
            
            let html = '';
            if (originalSynonymsData.length === 0) {
                html = '<tr><td colspan="4" class="p-8 text-center text-slate-400">Không có dữ liệu hợp lệ. Chuyển sang chế độ "Chỉnh sửa" để nhập.</td></tr>';
            } else {
                originalSynonymsData.forEach((item, index) => {
                    const wordsStr = item.words.map(w => w.display).join(' = ');
                    const isStarred = item.isStarred;
                    const rowBg = isStarred ? 'bg-amber-50/50' : 'hover:bg-slate-50';
                    const starIcon = isStarred ? 'fa-solid fa-star text-amber-500' : 'fa-regular fa-star text-slate-300 hover:text-amber-400';
                    const rowColor = isStarred ? 'text-amber-900' : 'text-slate-700';
                    
                    html += `
                        <tr class="border-b border-slate-100 last:border-0 ${rowBg} transition-colors ${rowColor}">
                            <td class="p-4 text-center font-bold opacity-60">${index + 1}</td>
                            <td class="p-4 font-bold text-brand-600">${wordsStr}</td>
                            <td class="p-4">${item.meaning}</td>
                            <td class="p-4 text-center">
                                <div class="flex items-center justify-center gap-1">
                                    <button onclick="toggleStarFromTable(${index})" class="w-8 h-8 rounded-full hover:bg-white transition-all shadow-sm flex items-center justify-center border border-transparent hover:border-slate-200" title="Đánh dấu sao">
                                        <i class="${starIcon} text-lg"></i>
                                    </button>
                                    <button onclick="deleteCardFromTable(${index})" class="w-8 h-8 rounded-full hover:bg-white text-slate-400 hover:text-rose-500 transition-all shadow-sm flex items-center justify-center border border-transparent hover:border-slate-200" title="Xóa từ này">
                                        <i class="fa-solid fa-trash-can text-sm"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
            
            if (setupTbody) setupTbody.innerHTML = html;
            if (studyTbody) studyTbody.innerHTML = html;
        }

        function showDeleteCardConfirm(e) {
            if (e) e.stopPropagation();
            const btn = document.getElementById('cardDeleteBtn');
            const popup = document.getElementById('cardDeleteConfirmPopup');
            if (!btn || !popup) return;
            
            // Tạm thời hiển thị ẩn để lấy kích thước
            popup.style.visibility = 'hidden';
            popup.classList.remove('hidden');

            const btnRect = btn.getBoundingClientRect();
            const popupRect = popup.getBoundingClientRect();

            // Tính toán vị trí tương đối với màn hình (fixed)
            const top = btnRect.top - popupRect.height - 12;
            const left = btnRect.left + (btnRect.width / 2) - (popupRect.width / 2);

            popup.style.top = top + 'px';
            popup.style.left = left + 'px';
            popup.style.visibility = 'visible';
            
            document.addEventListener('click', hideDeleteCardConfirmOutside);
        }

        function hideDeleteCardConfirm(e) {
            if (e) e.stopPropagation();
            const popup = document.getElementById('cardDeleteConfirmPopup');
            if (popup) popup.classList.add('hidden');
            document.removeEventListener('click', hideDeleteCardConfirmOutside);
        }

        function hideDeleteCardConfirmOutside(e) {
            const popup = document.getElementById('cardDeleteConfirmPopup');
            if (popup && !popup.contains(e.target) && !e.target.closest('#cardDeleteBtn')) {
                hideDeleteCardConfirm(null);
            }
        }

        function removeMeaningFromRawData(meaning) {
            const textarea = document.getElementById('rawData');
            if (!textarea) return;
            let lines = textarea.value.split('\n');
            let updatedLines = lines.filter(line => {
                let lastColon = line.lastIndexOf(':');
                if (lastColon === -1) return true;
                let meanPart = line.substring(lastColon + 1).trim();
                return meanPart !== meaning;
            });
            textarea.value = updatedLines.join('\n');
            localStorage.setItem('tudongnghia_raw_data', textarea.value);
        }

        function executeDeleteCard(e) {
            if (e) e.stopPropagation();
            hideDeleteCardConfirm();
            if (synonymsData.length === 0) return;
            
            const current = synonymsData[currentIndex];
            if (!current) return;
            
            removeMeaningFromRawData(current.meaning);

            const origIdx = originalSynonymsData.findIndex(o => o.meaning === current.meaning);
            if (origIdx !== -1) originalSynonymsData.splice(origIdx, 1);
            
            synonymsData.splice(currentIndex, 1);

            if (current.isStarred) {
                starredLines = starredLines.filter(m => m !== current.meaning);
                localStorage.setItem('tudongnghia_starred', JSON.stringify(starredLines));
            }

            renderTable();

            if (synonymsData.length === 0) {
                alert("Đã xóa hết từ vựng!");
                document.getElementById('flashcardScreen').classList.add('hidden');
                document.getElementById('setupScreen').classList.remove('hidden');
            } else {
                if (currentIndex >= synonymsData.length) {
                    currentIndex = synonymsData.length - 1;
                }
                applyGlobalRevealState();
                renderCard();
            }
        }

        function deleteCardFromTable(index) {
            const item = originalSynonymsData[index];
            if (!item) return;
            
            if (confirm(`Bạn có chắc muốn xóa từ "${item.words.map(w => w.display).join(' = ')} : ${item.meaning}"?`)) {
                removeMeaningFromRawData(item.meaning);

                originalSynonymsData.splice(index, 1);
                
                const synIdx = synonymsData.findIndex(d => d.meaning === item.meaning);
                if (synIdx !== -1) synonymsData.splice(synIdx, 1);

                if (item.isStarred) {
                    starredLines = starredLines.filter(m => m !== item.meaning);
                    localStorage.setItem('tudongnghia_starred', JSON.stringify(starredLines));
                }

                if (currentIndex >= synonymsData.length) {
                    currentIndex = Math.max(0, synonymsData.length - 1);
                }

                renderTable();
                if (synonymsData.length > 0) {
                    renderCard();
                } else {
                    document.getElementById('flashcardScreen').classList.add('hidden');
                    document.getElementById('setupScreen').classList.remove('hidden');
                }
            }
        }

        function toggleStarFromTable(index) {
            const item = originalSynonymsData[index];
            item.isStarred = !item.isStarred;
            
            if (item.isStarred) {
                if (!starredLines.includes(item.meaning)) starredLines.push(item.meaning);
            } else {
                starredLines = starredLines.filter(m => m !== item.meaning);
            }
            localStorage.setItem('tudongnghia_starred', JSON.stringify(starredLines));
            
            // Đồng bộ với synonymsData hiện tại nếu có
            const currentItem = synonymsData.find(d => d.meaning === item.meaning);
            if (currentItem) currentItem.isStarred = item.isStarred;
            
            if (isStarFilter && !item.isStarred) {
                synonymsData = originalSynonymsData.filter(d => d.isStarred);
                if (synonymsData.length === 0) {
                    toggleStarFilter();
                    return;
                }
                if (currentIndex >= synonymsData.length) currentIndex = synonymsData.length - 1;
            }
            
            renderCard();
            renderTable();
        }

        function prevCard() {

        function nextCard() {

        }

        function shuffleCards() {
            if (synonymsData.length === 0) return;
            // Thuật toán Fisher-Yates Shuffle
            for (let i = synonymsData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [synonymsData[i], synonymsData[j]] = [synonymsData[j], synonymsData[i]];
            }
            currentIndex = 0;
            applyGlobalRevealState();
            renderCard();
        }

        function applyGlobalRevealState() {
            if (!synonymsData[currentIndex]) return;
            synonymsData[currentIndex].words.forEach(w => w.revealed = isGlobalRevealed);
        }
        
        function toggleCardReveal() {
            isGlobalRevealed = !isGlobalRevealed;

            renderCard();
        }

        function fallbackTTS(text, lang, resolve) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = lang;
                
                let voices = window.speechSynthesis.getVoices();
                if (voices.length === 0) voices = globalVoices;
                
                const baseLang = lang.split('-')[0];
                let bestVoice = voices.find(v => v.lang.includes(baseLang) && (v.name.toLowerCase().includes('google') || (v.voiceURI && v.voiceURI.toLowerCase().includes('google'))));
                if (!bestVoice) bestVoice = voices.find(v => v.lang.includes(baseLang) && (v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('online') || v.name.toLowerCase().includes('hoaimy')));
                
                if (bestVoice) {
                    msg.voice = bestVoice;
                }
                
                if (resolve) {
                    msg.onend = resolve;
                    msg.onerror = resolve;
                    setTimeout(resolve, text.length > 30 ? 5000 : 3000); 
                }
                window.speechSynthesis.speak(msg);
            } else {
                if (resolve) resolve();
            }
        }

        function playTTSAsync(text, lang = 'en-US') {
            return new Promise(resolve => {
                // Dùng API mở rộng (gtx) để chống bị Google chặn khi đọc liên tục (Spam limit)
                const tl = lang === 'vi-VN' ? 'vi' : 'en';
                const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=${tl}&q=${encodeURIComponent(text)}`;
                const audio = new Audio(url);
                if (lang === 'vi-VN') audio.playbackRate = 1.25; 
                
                audio.onended = resolve;
                audio.onerror = () => fallbackTTS(text, lang, resolve);
                audio.play().catch(() => fallbackTTS(text, lang, resolve));
            });
        }

        function playTTS(text, lang = 'en-US') {
            const tl = lang === 'vi-VN' ? 'vi' : 'en';
            const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=${tl}&q=${encodeURIComponent(text)}`;
            const audio = new Audio(url);
            if (lang === 'vi-VN') audio.playbackRate = 1.25;
            
            audio.onerror = () => fallbackTTS(text, lang);
            audio.play().catch(() => fallbackTTS(text, lang));
        }
        
        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        async function checkSpelling() {
            if (!isEditMode) {
                toggleSetupMode(); // Chuyển sang Edit Mode để hiển thị lỗi và form textarea
            }

            const btn = document.getElementById('spellcheckBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> <span id="spellcheckBtnText">Đang quét...</span>`;
            btn.disabled = true;

            const textarea = document.getElementById('rawData');
            const suggestionsDiv = document.getElementById('spellSuggestions');
            suggestionsDiv.innerHTML = '';
            suggestionsDiv.classList.add('hidden');

            const text = textarea.value;
            const lines = text.split('\n');
            let suggestionsHTML = '';
            let checkCount = 0;
            let hasErrors = false;

            for (let i = 0; i < lines.length; i++) {
                let currentLine = lines[i];
                if (!currentLine.trim()) continue;

                let lastColon = currentLine.lastIndexOf(':');
                if (lastColon === -1) continue;
                
                let synsPart = currentLine.substring(0, lastColon).trim();
                let wordsRaw = synsPart.split('=').map(w => w.trim()).filter(w => w);

                for (let j = 0; j < wordsRaw.length; j++) {
                    let rawW = wordsRaw[j];
                    let checkW = rawW.replace(/\([^)]*\)/g, '').trim().toLowerCase();
                    checkW = checkW.replace(/\s+/g, ' ');
                    
                    if (!checkW || checkW.includes(' ') || checkW.includes('-')) continue;

                    let suggestion = null;
                    let datamuseHasWord = false;

                    try {
                        const res = await fetch(`https://api.datamuse.com/words?sp=${encodeURIComponent(checkW)}&max=5`);
                        const data = await res.json();
                        if (data && data.length > 0) {
                            for (let d of data) {
                                if (d.word.toLowerCase() === checkW) {
                                    datamuseHasWord = true;
                                    break;
                                }
                            }
                            const dWord = data[0].word.toLowerCase();
                            if (dWord !== checkW && !datamuseHasWord) {
                                suggestion = dWord;
                            }
                        }
                    } catch (e) {}

                    if (!suggestion && !datamuseHasWord) {
                        try {
                            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&dt=bd&dt=sp&q=${encodeURIComponent(checkW)}`;
                            const res = await fetch(url);
                            const data = await res.json();
                            if (data && data[7] && data[7][1]) {
                                let corrected = data[7][1].replace(/<[^>]*>?/gm, '').toLowerCase().trim();
                                if (/^[a-z \-']+$/.test(corrected) && corrected && corrected !== checkW) {
                                    suggestion = corrected;
                                }
                            }
                        } catch (e) {}
                    }

                    if (!suggestion && !datamuseHasWord) {
                        try {
                            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(checkW)}`);
                            if (!dictRes.ok) {
                                let guess = checkW;
                                let foundGuess = null;
                                while (guess.length > 3) {
                                    guess = guess.slice(0, -1);
                                    try {
                                        const gRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(guess)}`);
                                        if (gRes.ok) { foundGuess = guess; break; }
                                    } catch (e) {}
                                }
                                suggestion = foundGuess ? foundGuess : "[TỪ KHÔNG CÓ THẬT]";
                            }
                        } catch (e) {}
                    }

                    if (suggestion) {
                        hasErrors = true;
                        if (suggestion === "[TỪ KHÔNG CÓ THẬT]") {
                            suggestionsHTML += `<div class="flex items-center justify-between text-sm p-2 bg-rose-100 text-rose-800 rounded-lg">
                                <span>Dòng ${i + 1}: <b class="line-through opacity-70">${checkW}</b> không tồn tại!</span>
                            </div>`;
                        } else {
                            suggestionsHTML += `<div class="flex items-center justify-between text-sm p-2 bg-amber-50 text-amber-800 rounded-lg shadow-sm border border-amber-100">
                                <span>Dòng ${i + 1}: <b class="line-through opacity-70 text-slate-500">${checkW}</b> <i class="fa-solid fa-arrow-right mx-1 text-slate-400"></i> <b class="text-amber-700">${suggestion}</b></span>
                                <button type="button" onclick="applySpellingFix(${i}, '${rawW.replace(/'/g, "\\'")}', '${suggestion.replace(/'/g, "\\'")}', this)" class="px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white rounded-lg shadow-sm text-xs font-bold transition-all active:scale-95"><i class="fa-solid fa-wand-magic-sparkles mr-1 pointer-events-none"></i> Sửa</button>
                            </div>`;
                        }
                    }

                    checkCount++;
                    if (checkCount % 3 === 0) await sleep(100);
                }
            }

            btn.innerHTML = `<i class="fa-solid fa-check mr-1.5"></i> <span id="spellcheckBtnText">Hoàn tất</span>`;
            if (hasErrors) {
                suggestionsDiv.innerHTML = `<div class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider flex items-center gap-1.5"><i class="fa-solid fa-lightbulb text-amber-400"></i> Đề xuất sửa lỗi</div>` + suggestionsHTML;
                suggestionsDiv.classList.remove('hidden');
            } else {
                suggestionsDiv.innerHTML = `<div class="text-sm text-emerald-600 font-bold flex items-center gap-2"><i class="fa-solid fa-circle-check text-lg"></i> Không phát hiện lỗi chính tả nào. Tuyệt vời!</div>`;
                suggestionsDiv.classList.remove('hidden');
                setTimeout(() => { suggestionsDiv.classList.add('hidden'); }, 3000);
            }

            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }, 2000);
        }

        function applySpellingFix(lineIndex, oldWord, newWord, btnElement) {
            const textarea = document.getElementById('rawData');
            let lines = textarea.value.split('\n');
            if (lines[lineIndex]) {
                const checkW = oldWord.replace(/\([^)]*\)/g, '').trim();
                if (checkW) {
                    lines[lineIndex] = lines[lineIndex].replace(new RegExp(`\\b${checkW}\\b`), newWord);
                    textarea.value = lines.join('\n');
                    localStorage.setItem('tudongnghia_raw_data', textarea.value);
                    
                    if (btnElement) {
                        btnElement.innerHTML = '<i class="fa-solid fa-check"></i> Đã sửa';
                        btnElement.classList.replace('bg-amber-500', 'bg-emerald-500');
                        btnElement.classList.replace('hover:bg-amber-600', 'hover:bg-emerald-600');
                        btnElement.classList.add('pointer-events-none');
                    }

                    // Highlight the replaced word
                    let charCount = 0;
                    for (let i = 0; i < lineIndex; i++) {
                        charCount += lines[i].length + 1; // +1 cho ký tự xuống dòng \n
                    }
                    const wordIndexInLine = lines[lineIndex].indexOf(newWord);
                    if (wordIndexInLine !== -1) {
                        const startPos = charCount + wordIndexInLine;
                        const endPos = startPos + newWord.length;
                        textarea.focus();
                        textarea.setSelectionRange(startPos, endPos);
                    }
                }
            }
        }

        async function runAutoPlayCycle() {
            if (!isAutoPlaying) return;
            
            const current = synonymsData[currentIndex];
            // Hiện hết các từ
            current.words.forEach(w => w.revealed = true);
            renderCard();
            
            // 1. Đọc tiếng Việt trước ("giọng chị Google")
            if (!isAutoPlaying) return;
            // Thay dấu • thành dấu phẩy để đọc ngắt quãng tự nhiên hơn
            const viText = current.meaning.replace(/•/g, ',');
            await playTTSAsync(viText, 'vi-VN');
            await sleep(800); // Nghỉ 0.8s trước khi đọc tiếng Anh
            
            // 2. Đọc lần lượt từng từ tiếng Anh
            for (const w of current.words) {
                if (!isAutoPlaying) return;
                await playTTSAsync(w.check, 'en-US');
                await sleep(600); // Nghỉ giữa các từ tiếng Anh
            }
            
            if (!isAutoPlaying) return;
            // Chờ 1s trước khi qua câu mới
            await sleep(1000); 
            
            if (isAutoPlaying) {
                if (currentIndex < synonymsData.length - 1) {
                    currentIndex++;
                } else {
                    currentIndex = 0;
                }
                applyGlobalRevealState(); // Áp dụng lại trạng thái
                renderCard();
                autoPlayInterval = setTimeout(runAutoPlayCycle, 500);
            }
        }

        function generateDiffHtml(typedWord, correctWord) {
            let html = '';
            const maxLen = Math.max(typedWord.length, correctWord.length);
            for (let i = 0; i < maxLen; i++) {
                const charTyped = typedWord[i] || '';
                const charCorrect = correctWord[i] || '';
                
                if (charTyped === charCorrect) {
                    html += `<span class="text-emerald-400">${charCorrect}</span>`;
                } else {
                    const displayChar = charCorrect === ' ' ? '&nbsp;' : (charCorrect || '_');
                    html += `<span class="text-rose-400 border-b-2 border-rose-400/50 pb-[2px] mx-[1px]">${displayChar}</span>`;
                }
            }
            return html;
        }

        function getLevenshteinDistance(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }
            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getHintText(checkWord, idx) {
            if (hintLevel === 0) return "••••••";
            if (hintLevel === 1) return checkWord.substring(0, 1) + "••••";
            if (hintLevel === 2) return checkWord.substring(0, 2) + "•••";
            if (hintLevel === 3) {
                if (idx === 0) return checkWord;
                return checkWord.substring(0, 2) + "•••";
            }
            return "••••••";
        }

        function getHintValue(checkWord, idx) {
            if (hintLevel === 0) return "";
            if (hintLevel === 1) return checkWord.substring(0, 1);
            if (hintLevel === 2) return checkWord.substring(0, 2);
            if (hintLevel === 3) {
                if (idx === 0) return checkWord;
                return checkWord.substring(0, 2);
            }
            return "";
        }

        function renderCard() {
            hideDeleteCardConfirm();
            if (synonymsData.length === 0) return;
            const current = synonymsData[currentIndex];
            
            document.getElementById('meaningDisplay').innerText = current.meaning;
            document.getElementById('progressText').innerText = `${currentIndex + 1}/${synonymsData.length}`;
            
            const topEyeIcon = document.getElementById('cardRevealIcon');
            if (topEyeIcon) {
                const allRevealed = current.words.every(w => w.revealed);
                topEyeIcon.className = allRevealed ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
            }
            
            const topStarIcon = document.getElementById('cardStarIcon');
            if (topStarIcon) {
                if (current.isStarred) {
                    topStarIcon.className = "fa-solid fa-star text-amber-500 text-lg drop-shadow-sm scale-110 transition-transform";
                } else {
                    topStarIcon.className = "fa-regular fa-star text-lg text-slate-400";
                }
            }
            
            const container = document.getElementById('wordsContainer');
            container.innerHTML = '';
            
            current.words.forEach((wordObj, idx) => {
                if (hintLevel === 3 && idx === 0 && !isTypeMode) {
                    wordObj.revealed = true;
                }
                
                if (isTypeMode) {
                    if (wordObj.revealed) {
                        const box = document.createElement('div');
                        box.className = "h-[54px] px-8 bg-emerald-50 text-emerald-600 font-bold text-xl rounded-full flex items-center justify-center border-2 border-emerald-400 shadow-[0_4px_12px_rgba(52,211,153,0.15)] min-w-[120px] transition-all cursor-pointer hover:bg-emerald-100";
                        box.innerText = wordObj.display;
                        box.title = "Chuột phải để nghe phát âm";
                        box.oncontextmenu = (e) => {
                            e.preventDefault();
                            playTTS(wordObj.check);
                        };
                        container.appendChild(box);
                    } else {
                        const wrapper = document.createElement('div');
                        wrapper.className = "relative flex flex-col items-center";
                        
                        const input = document.createElement('input');
                        input.type = "text";
                        input.className = "w-48 h-[54px] px-6 bg-slate-50 border-2 border-slate-200 text-slate-700 font-bold text-xl rounded-full text-center outline-none focus:bg-white focus:border-brand-500 pulse-border transition-all";
                        input.placeholder = getHintText(wordObj.check, idx);
                        input.value = getHintValue(wordObj.check, idx);
                        
                        input.oninput = (e) => {
                            let val = e.target.value.toLowerCase().trim();
                            val = val.replace(/\s+/g, ' '); 

                            if (e.target.classList.contains('border-rose-400')) {
                                e.target.classList.remove('border-rose-400', 'text-rose-500', 'bg-rose-50', 'focus:border-rose-400');
                                e.target.classList.add('border-slate-200', 'text-slate-700', 'bg-slate-50', 'focus:border-brand-500');
                                const diffBox = wrapper.querySelector('.diff-box');
                                if (diffBox) diffBox.remove();
                            }
                            
                            const matchedWord = current.words.find(w => !w.revealed && val === w.check);
                            if (matchedWord) {
                                matchedWord.revealed = true;
                                if (isAutoReadWord) playTTS(matchedWord.check);
                                renderCard(); 
                                setTimeout(() => {
                                    const nextInput = container.querySelector('input');
                                    if (nextInput) nextInput.focus();
                                }, 50);
                            }
                        };
                        
                        input.onkeydown = (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                e.stopPropagation();
                                let val = e.target.value.toLowerCase().trim();
                                val = val.replace(/\s+/g, ' '); 
                                
                                const matchedWord = current.words.find(w => !w.revealed && val === w.check);
                                if (matchedWord) {
                                    matchedWord.revealed = true;
                                    if (isAutoReadWord) playTTS(matchedWord.check);
                                    renderCard(); 
                                    setTimeout(() => {
                                        const nextInput = container.querySelector('input');
                                        if (nextInput) nextInput.focus();
                                    }, 50);
                                } else if (val !== '') {
                                    // Sai -> Đổi màu đỏ
                                    e.target.classList.remove('border-slate-200', 'text-slate-700', 'bg-slate-50', 'focus:border-brand-500');
                                    e.target.classList.add('border-rose-400', 'text-rose-500', 'bg-rose-50', 'focus:border-rose-400');
                                    
                                    // Tìm từ chưa mở giống với từ vừa gõ nhất (Smart Spell Check)
                                    let bestMatch = wordObj.check;
                                    let minDistance = Infinity;
                                    current.words.forEach(w => {
                                        if (!w.revealed) {
                                            const dist = getLevenshteinDistance(val, w.check);
                                            if (dist < minDistance) {
                                                minDistance = dist;
                                                bestMatch = w.check;
                                            }
                                        }
                                    });

                                    let diffBox = wrapper.querySelector('.diff-box');
                                    if (!diffBox) {
                                        diffBox = document.createElement('div');
                                        // Floating Tooltip style
                                        diffBox.className = "diff-box diff-tooltip absolute top-[64px] left-1/2 w-max px-5 py-2 bg-slate-800 text-white rounded-xl shadow-xl z-20 font-bold text-lg flex items-center justify-center tracking-widest pointer-events-none";
                                        
                                        // Mũi tên chỉ lên của tooltip
                                        const arrow = document.createElement('div');
                                        arrow.className = "absolute -top-1.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-slate-800 rotate-45";
                                        diffBox.appendChild(arrow);
                                        
                                        const content = document.createElement('div');
                                        content.className = "diff-content relative z-10";
                                        diffBox.appendChild(content);

                                        wrapper.appendChild(diffBox);
                                    }
                                    wrapper.querySelector('.diff-content').innerHTML = generateDiffHtml(val, bestMatch);
                                }
                            } else if (e.key === 'Backspace') {
                                if (e.target.classList.contains('border-rose-400')) {
                                    e.preventDefault();
                                    e.target.value = getHintValue(wordObj.check, idx);
                                    e.target.classList.remove('border-rose-400', 'text-rose-500', 'bg-rose-50', 'focus:border-rose-400');
                                    e.target.classList.add('border-slate-200', 'text-slate-700', 'bg-slate-50', 'focus:border-brand-500');
                                    const diffBox = wrapper.querySelector('.diff-box');
                                    if (diffBox) diffBox.remove();
                                }
                            }
                        };
                        
                        wrapper.appendChild(input);
                        container.appendChild(wrapper);
                    }
                } else {
                    if (wordObj.revealed) {
                        const box = document.createElement('div');
                        box.className = "h-[54px] px-8 bg-brand-50 text-brand-600 font-bold text-xl rounded-full flex items-center justify-center border-2 border-brand-400 shadow-[0_4px_12px_rgba(99,102,241,0.15)] min-w-[120px] cursor-pointer hover:bg-brand-100 transition-all";
                        box.innerText = wordObj.display;
                        box.title = "Chuột trái để ẩn / Chuột phải để nghe";
                        box.onclick = () => {
                            wordObj.revealed = false;
                            renderCard();
                        };
                        box.oncontextmenu = (e) => {
                            e.preventDefault();
                            playTTS(wordObj.check);
                        };
                        container.appendChild(box);
                    } else {
                        const hiddenBox = document.createElement('div');
                        hiddenBox.className = "h-[54px] px-8 bg-slate-50 border-2 border-slate-200 rounded-full text-slate-400 font-bold text-xl select-none cursor-pointer hover:bg-slate-100 hover:text-slate-600 transition-all flex items-center justify-center min-w-[120px] tracking-widest";
                        hiddenBox.innerText = getHintText(wordObj.check, idx);
                        
                        hiddenBox.onclick = () => {
                            wordObj.revealed = true;
                            if (isAutoReadWord) playTTS(wordObj.check);
                            renderCard();
                        };
                        container.appendChild(hiddenBox);
                    }
                }
            });

            if (isTypeMode) {
                setTimeout(() => {
                    const firstInput = container.querySelector('input');
                    if (firstInput) {
                        firstInput.focus();
                        const val = firstInput.value;
                        firstInput.setSelectionRange(val.length, val.length);
                    }
                }, 50);
            }
        }
        // Global Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            const setupScreen = document.getElementById('setupScreen');
            if (!setupScreen.classList.contains('hidden')) return;
            
            if (e.key === 'Enter') {
                if (synonymsData.length > 0 && synonymsData[currentIndex]) {
                    const current = synonymsData[currentIndex];
                    const allRevealed = current.words.every(w => w.revealed);
                    if (allRevealed) {
                        nextCard();
                    }
                }
            } else if (e.key === 'ArrowRight') {
                if (document.activeElement.tagName !== 'INPUT') {
                    nextCard();
                }
            } else if (e.key === 'ArrowLeft') {
                if (document.activeElement.tagName !== 'INPUT') {
                    prevCard();
                }
            }
        });
        
        // Lưu trữ bộ nhớ nội bộ (localStorage)
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('rawData');
            const savedData = localStorage.getItem('tudongnghia_raw_data');
            if (savedData) {
                textarea.value = savedData;
            }
            
            textarea.addEventListener('input', (e) => {
                localStorage.setItem('tudongnghia_raw_data', e.target.value);
            });
            
            silentParseData(); // Initial load for table
        });
        
    </script>

    <!-- Delete Confirm Popup (Fixed position to avoid 3D clipping) -->
    <div id="cardDeleteConfirmPopup"
        class="hidden fixed w-44 bg-white/95 backdrop-blur-xl border border-slate-200/60 rounded-2xl shadow-2xl p-2.5 z-[9999] animate-fade-in origin-bottom">
        <div class="flex gap-2">
            <button onclick="hideDeleteCardConfirm(event)" style="color: #ffffff !important;"
                class="flex-1 py-1.5 bg-brand-600 hover:bg-brand-500 font-bold text-[13px] rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.25)] hover:shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all hover:-translate-y-0.5">Hủy</button>
            <button onclick="executeDeleteCard(event)" style="color: #ffffff !important;"
                class="flex-1 py-1.5 bg-rose-500 hover:bg-rose-600 font-bold text-[13px] rounded-xl shadow-lg shadow-rose-500/30 transition-all hover:-translate-y-0.5">Xóa</button>
        </div>
        <!-- Pointer Arrow -->
        <div
            class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white/95 backdrop-blur-xl border-b border-r border-slate-200/60 rotate-45 rounded-sm">
        </div>
    </div>
</body>
</html>
