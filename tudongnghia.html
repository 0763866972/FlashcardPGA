<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ Đồng Nghĩa - Premium Practice</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔗</text></svg>">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0,0,0,0.05);
        }

        .diff-tooltip {
            animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: top center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, -10px) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }
        
        .pulse-border:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand-200 selection:text-brand-900 flex flex-col items-center p-4 md:p-8">

    <div class="w-full max-w-4xl flex items-center justify-between mb-8">
        <h1 class="text-2xl font-black text-slate-800"><i class="fa-solid fa-link text-brand-500 mr-2"></i> Từ Đồng Nghĩa</h1>
        <a href="index.html" class="px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-50 shadow-sm transition"><i class="fa-solid fa-house mr-1"></i> Trang chủ</a>
    </div>

    <!-- Màn hình Nhập Dữ Liệu -->
    <div id="setupScreen" class="w-full max-w-3xl bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-lg font-bold mb-4 text-slate-700"><i class="fa-solid fa-paste mr-2"></i>Nhập danh sách từ đồng nghĩa</h2>
        <p class="text-sm text-slate-500 mb-4">Định dạng: <code>từ 1 = từ 2 (loại từ) = từ 3 : Nghĩa tiếng việt</code></p>
        <textarea id="rawData" rows="10" class="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 text-slate-700 font-mono text-sm focus:border-brand-500 focus:ring-1 focus:ring-brand-500 outline-none transition" placeholder="enable (v) sb/ sth to do sth = allow = permit = approve : cho phép&#10;fast = quick = rapid : nhanh"></textarea>
        
        <button onclick="parseData()" class="mt-4 w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl shadow-md transition-all active:scale-[0.98]">
            <i class="fa-solid fa-rocket mr-2"></i> Bắt đầu học
        </button>
    </div>

    <!-- Màn hình Học -->
    <div id="flashcardScreen" class="w-full max-w-3xl hidden flex flex-col gap-6">
        
        <!-- Controls -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleMode()" id="modeBtn" class="px-4 py-2 bg-indigo-50 text-indigo-700 font-bold rounded-lg border border-indigo-200 hover:bg-indigo-100 transition">
                    <i class="fa-solid fa-eye-slash mr-2" id="modeIcon"></i> <span id="modeText">Lật thẻ (Click)</span>
                </button>
                <select id="hintLevel" onchange="changeHint()" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-slate-700 outline-none cursor-pointer">
                    <option value="0">Không gợi ý</option>
                    <option value="1">Gợi ý 1 chữ đầu</option>
                    <option value="2">Gợi ý 2 chữ đầu</option>
                    <option value="3">Hiện từ đầu, còn lại gợi ý 2 chữ</option>
                </select>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleAutoPlay()" id="autoPlayBtn" class="px-4 py-2 bg-white text-slate-600 font-bold rounded-lg border border-slate-200 hover:bg-slate-50 transition shadow-sm active:scale-95">
                    <i class="fa-solid fa-headphones mr-2" id="autoPlayIcon"></i> <span>Rảnh tai</span>
                </button>
            </div>
        </div>

        <!-- Study Board -->
        <div class="glass-card rounded-[2.5rem] overflow-hidden w-full max-w-5xl mx-auto mt-12 flex flex-col shadow-2xl shadow-brand-500/10">
            
            <!-- Header (Nghĩa Tiếng Việt) -->
            <div class="bg-white/60 px-8 py-6 relative border-b border-white/50 flex flex-col items-center justify-center">
                <button onclick="toggleCardReveal()" class="absolute top-4 right-6 w-10 h-10 rounded-full hover:bg-white/80 text-slate-400 hover:text-brand-500 flex items-center justify-center transition-all shadow-sm" title="Ẩn/Hiện">
                    <i id="cardRevealIcon" class="fa-solid fa-eye-slash"></i>
                </button>
                <div class="text-xs font-bold text-brand-400 tracking-widest uppercase mb-2" id="progressText">1/1</div>
                <h2 id="meaningDisplay" class="text-3xl md:text-4xl font-extrabold bg-gradient-to-br from-rose-500 to-orange-400 bg-clip-text text-transparent text-center leading-tight drop-shadow-sm pb-1">Loading...</h2>
            </div>
            
            <!-- Các từ đồng nghĩa -->
            <div class="p-8 md:p-12 bg-slate-50/50 flex-1 min-h-[250px] flex items-center justify-center">
                <div id="wordsContainer" class="w-full flex flex-wrap justify-center items-start gap-5">
                    <!-- Nội dung render bằng JS -->
                </div>
            </div>
            
            <!-- Controls (Chuyển câu) -->
            <div class="px-8 py-6 bg-white/60 border-t border-white/50 flex justify-between items-center">
                <button onclick="prevCard()" class="px-8 py-3 bg-brand-600 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/30 hover:bg-brand-700 hover:-translate-y-1 transition-all flex items-center">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Câu trước
                </button>
                <button onclick="shuffleCards()" class="p-4 text-slate-400 hover:text-brand-600 bg-white hover:bg-brand-50 rounded-full shadow-sm transition-all active:scale-95" title="Trộn thẻ">
                    <i class="fa-solid fa-shuffle text-xl"></i>
                </button>
                <button onclick="nextCard()" class="px-8 py-3 bg-brand-600 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/30 hover:bg-brand-700 hover:-translate-y-1 transition-all flex items-center">
                    Câu tiếp theo <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        let synonymsData = [];
        let currentIndex = 0;
        let isTypeMode = false;
        let hintLevel = 0; // 0: None, 1: 1 char, 2: 2 chars, 3: First word full + 2 chars
        let isGlobalRevealed = false;
        let isAutoPlaying = false;
        let autoPlayInterval = null;
        
        // Cố gắng tải danh sách giọng nói trước (Chrome bug fix)
        let globalVoices = [];
        if ('speechSynthesis' in window) {
            globalVoices = window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                globalVoices = window.speechSynthesis.getVoices();
            };
        }

        function parseData() {
            const raw = document.getElementById('rawData').value;
            const lines = raw.split('\n');
            synonymsData = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                let lastColon = line.lastIndexOf(':');
                if (lastColon === -1) continue; // Bỏ qua nếu không có nghĩa
                
                let synsPart = line.substring(0, lastColon).trim();
                let meanPart = line.substring(lastColon + 1).trim();
                
                // Tách các từ, loại bỏ khoảng trắng dư thừa
                let wordsRaw = synsPart.split('=').map(w => w.trim()).filter(w => w);
                if (wordsRaw.length === 0) continue;
                
                let words = wordsRaw.map(w => {
                    // Xóa phần trong ngoặc () để check chính tả
                    let checkW = w.replace(/\([^)]*\)/g, '').trim().toLowerCase();
                    // Loại bỏ nhiều khoảng trắng liên tiếp
                    checkW = checkW.replace(/\s+/g, ' ');
                    return { display: w, check: checkW, revealed: false };
                });
                
                synonymsData.push({
                    meaning: meanPart,
                    words: words
                });
            }
            
            if (synonymsData.length > 0) {
                document.getElementById('setupScreen').classList.add('hidden');
                document.getElementById('flashcardScreen').classList.remove('hidden');
                currentIndex = 0;
                renderCard();
            } else {
                alert("Không tìm thấy dữ liệu hợp lệ! Hãy kiểm tra lại định dạng.");
            }
        }

        function toggleMode() {
            isTypeMode = !isTypeMode;
            const icon = document.getElementById('modeIcon');
            const text = document.getElementById('modeText');
            const hintSelect = document.getElementById('hintLevel');
            
            if (isTypeMode) {
                icon.className = "fa-solid fa-keyboard mr-2";
                text.innerText = "Chế độ Gõ phím";
            } else {
                icon.className = "fa-solid fa-hand-pointer mr-2";
                text.innerText = "Lật thẻ (Click)";
            }
            
            isGlobalRevealed = false;
            applyGlobalRevealState();
            renderCard();
        }

        function changeHint() {
            hintLevel = parseInt(document.getElementById('hintLevel').value);
            renderCard();
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = synonymsData.length - 1;
            }
            applyGlobalRevealState();
            renderCard();
        }

        function nextCard() {
            if (currentIndex < synonymsData.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            applyGlobalRevealState();
            renderCard();
        }

        function shuffleCards() {
            if (synonymsData.length === 0) return;
            // Thuật toán Fisher-Yates Shuffle
            for (let i = synonymsData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [synonymsData[i], synonymsData[j]] = [synonymsData[j], synonymsData[i]];
            }
            currentIndex = 0;
            applyGlobalRevealState();
            renderCard();
        }

        function applyGlobalRevealState() {
            if (!synonymsData[currentIndex]) return;
            synonymsData[currentIndex].words.forEach(w => w.revealed = isGlobalRevealed);
        }
        
        function toggleCardReveal() {
            isGlobalRevealed = !isGlobalRevealed;
            applyGlobalRevealState();
            renderCard();
        }

        function fallbackTTS(text, lang, resolve) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = lang;
                
                let voices = window.speechSynthesis.getVoices();
                if (voices.length === 0) voices = globalVoices;
                
                const baseLang = lang.split('-')[0];
                let bestVoice = voices.find(v => v.lang.includes(baseLang) && (v.name.toLowerCase().includes('google') || (v.voiceURI && v.voiceURI.toLowerCase().includes('google'))));
                if (!bestVoice) bestVoice = voices.find(v => v.lang.includes(baseLang) && (v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('online') || v.name.toLowerCase().includes('hoaimy')));
                
                if (bestVoice) {
                    msg.voice = bestVoice;
                }
                
                if (resolve) {
                    msg.onend = resolve;
                    msg.onerror = resolve;
                    setTimeout(resolve, text.length > 30 ? 5000 : 3000); 
                }
                window.speechSynthesis.speak(msg);
            } else {
                if (resolve) resolve();
            }
        }

        function playTTSAsync(text, lang = 'en-US') {
            return new Promise(resolve => {
                // Dùng API mở rộng (gtx) để chống bị Google chặn khi đọc liên tục (Spam limit)
                const tl = lang === 'vi-VN' ? 'vi' : 'en';
                const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=${tl}&q=${encodeURIComponent(text)}`;
                const audio = new Audio(url);
                if (lang === 'vi-VN') audio.playbackRate = 1.25; 
                
                audio.onended = resolve;
                audio.onerror = () => fallbackTTS(text, lang, resolve);
                audio.play().catch(() => fallbackTTS(text, lang, resolve));
            });
        }

        function playTTS(text, lang = 'en-US') {
            const tl = lang === 'vi-VN' ? 'vi' : 'en';
            const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=${tl}&q=${encodeURIComponent(text)}`;
            const audio = new Audio(url);
            if (lang === 'vi-VN') audio.playbackRate = 1.25;
            
            audio.onerror = () => fallbackTTS(text, lang);
            audio.play().catch(() => fallbackTTS(text, lang));
        }
        
        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function toggleAutoPlay() {
            isAutoPlaying = !isAutoPlaying;
            const btn = document.getElementById('autoPlayBtn');
            const icon = document.getElementById('autoPlayIcon');
            
            if (isAutoPlaying) {
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                btn.classList.add('bg-rose-50', 'text-rose-600', 'border-rose-200', 'animate-pulse');
                icon.className = "fa-solid fa-stop mr-2";
                runAutoPlayCycle();
            } else {
                btn.classList.remove('bg-rose-50', 'text-rose-600', 'border-rose-200', 'animate-pulse');
                btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                icon.className = "fa-solid fa-headphones mr-2";
                if (autoPlayInterval) clearTimeout(autoPlayInterval);
                window.speechSynthesis.cancel();
            }
        }

        async function runAutoPlayCycle() {
            if (!isAutoPlaying) return;
            
            const current = synonymsData[currentIndex];
            // Hiện hết các từ
            current.words.forEach(w => w.revealed = true);
            renderCard();
            
            // 1. Đọc tiếng Việt trước ("giọng chị Google")
            if (!isAutoPlaying) return;
            // Thay dấu • thành dấu phẩy để đọc ngắt quãng tự nhiên hơn
            const viText = current.meaning.replace(/•/g, ',');
            await playTTSAsync(viText, 'vi-VN');
            await sleep(800); // Nghỉ 0.8s trước khi đọc tiếng Anh
            
            // 2. Đọc lần lượt từng từ tiếng Anh
            for (const w of current.words) {
                if (!isAutoPlaying) return;
                await playTTSAsync(w.check, 'en-US');
                await sleep(600); // Nghỉ giữa các từ tiếng Anh
            }
            
            if (!isAutoPlaying) return;
            // Chờ 1s trước khi qua câu mới
            await sleep(1000); 
            
            if (isAutoPlaying) {
                if (currentIndex < synonymsData.length - 1) {
                    currentIndex++;
                } else {
                    currentIndex = 0;
                }
                applyGlobalRevealState(); // Áp dụng lại trạng thái
                renderCard();
                autoPlayInterval = setTimeout(runAutoPlayCycle, 500);
            }
        }

        function generateDiffHtml(typedWord, correctWord) {
            let html = '';
            const maxLen = Math.max(typedWord.length, correctWord.length);
            for (let i = 0; i < maxLen; i++) {
                const charTyped = typedWord[i] || '';
                const charCorrect = correctWord[i] || '';
                
                if (charTyped === charCorrect) {
                    html += `<span class="text-emerald-400">${charCorrect}</span>`;
                } else {
                    const displayChar = charCorrect === ' ' ? '&nbsp;' : (charCorrect || '_');
                    html += `<span class="text-rose-400 border-b-2 border-rose-400/50 pb-[2px] mx-[1px]">${displayChar}</span>`;
                }
            }
            return html;
        }

        function getLevenshteinDistance(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }
            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getHintText(checkWord, idx) {
            if (hintLevel === 0) return "••••••";
            if (hintLevel === 1) return checkWord.substring(0, 1) + "••••";
            if (hintLevel === 2) return checkWord.substring(0, 2) + "•••";
            if (hintLevel === 3) {
                if (idx === 0) return checkWord;
                return checkWord.substring(0, 2) + "•••";
            }
            return "••••••";
        }

        function getHintValue(checkWord, idx) {
            if (hintLevel === 0) return "";
            if (hintLevel === 1) return checkWord.substring(0, 1);
            if (hintLevel === 2) return checkWord.substring(0, 2);
            if (hintLevel === 3) {
                if (idx === 0) return checkWord;
                return checkWord.substring(0, 2);
            }
            return "";
        }

        function renderCard() {
            if (synonymsData.length === 0) return;
            const current = synonymsData[currentIndex];
            
            document.getElementById('meaningDisplay').innerText = current.meaning;
            document.getElementById('progressText').innerText = `${currentIndex + 1}/${synonymsData.length}`;
            
            const topEyeIcon = document.getElementById('cardRevealIcon');
            if (topEyeIcon) {
                const allRevealed = current.words.every(w => w.revealed);
                topEyeIcon.className = allRevealed ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
            }
            
            const container = document.getElementById('wordsContainer');
            container.innerHTML = '';
            
            current.words.forEach((wordObj, idx) => {
                if (hintLevel === 3 && idx === 0 && !isTypeMode) {
                    wordObj.revealed = true;
                }
                
                if (isTypeMode) {
                    if (wordObj.revealed) {
                        const box = document.createElement('div');
                        box.className = "h-[54px] px-8 bg-emerald-50 text-emerald-600 font-bold text-xl rounded-full flex items-center justify-center border-2 border-emerald-400 shadow-[0_4px_12px_rgba(52,211,153,0.15)] min-w-[120px] transition-all cursor-pointer hover:bg-emerald-100";
                        box.innerText = wordObj.display;
                        box.title = "Chuột phải để nghe phát âm";
                        box.oncontextmenu = (e) => {
                            e.preventDefault();
                            playTTS(wordObj.check);
                        };
                        container.appendChild(box);
                    } else {
                        const wrapper = document.createElement('div');
                        wrapper.className = "relative flex flex-col items-center";
                        
                        const input = document.createElement('input');
                        input.type = "text";
                        input.className = "w-48 h-[54px] px-6 bg-slate-50 border-2 border-slate-200 text-slate-700 font-bold text-xl rounded-full text-center outline-none focus:bg-white focus:border-brand-500 pulse-border transition-all";
                        input.placeholder = getHintText(wordObj.check, idx);
                        input.value = getHintValue(wordObj.check, idx);
                        
                        input.oninput = (e) => {
                            let val = e.target.value.toLowerCase().trim();
                            val = val.replace(/\s+/g, ' '); 

                            if (e.target.classList.contains('border-rose-400')) {
                                e.target.classList.remove('border-rose-400', 'text-rose-500', 'bg-rose-50', 'focus:border-rose-400');
                                e.target.classList.add('border-slate-200', 'text-slate-700', 'bg-slate-50', 'focus:border-brand-500');
                                const diffBox = wrapper.querySelector('.diff-box');
                                if (diffBox) diffBox.remove();
                            }
                            
                            const matchedWord = current.words.find(w => !w.revealed && val === w.check);
                            if (matchedWord) {
                                matchedWord.revealed = true;
                                renderCard(); 
                                setTimeout(() => {
                                    const nextInput = container.querySelector('input');
                                    if (nextInput) nextInput.focus();
                                }, 50);
                            }
                        };
                        
                        input.onkeydown = (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                e.stopPropagation();
                                let val = e.target.value.toLowerCase().trim();
                                val = val.replace(/\s+/g, ' '); 
                                
                                const matchedWord = current.words.find(w => !w.revealed && val === w.check);
                                if (matchedWord) {
                                    matchedWord.revealed = true;
                                    renderCard(); 
                                    setTimeout(() => {
                                        const nextInput = container.querySelector('input');
                                        if (nextInput) nextInput.focus();
                                    }, 50);
                                } else if (val !== '') {
                                    // Sai -> Đổi màu đỏ
                                    e.target.classList.remove('border-slate-200', 'text-slate-700', 'bg-slate-50', 'focus:border-brand-500');
                                    e.target.classList.add('border-rose-400', 'text-rose-500', 'bg-rose-50', 'focus:border-rose-400');
                                    
                                    // Tìm từ chưa mở giống với từ vừa gõ nhất (Smart Spell Check)
                                    let bestMatch = wordObj.check;
                                    let minDistance = Infinity;
                                    current.words.forEach(w => {
                                        if (!w.revealed) {
                                            const dist = getLevenshteinDistance(val, w.check);
                                            if (dist < minDistance) {
                                                minDistance = dist;
                                                bestMatch = w.check;
                                            }
                                        }
                                    });

                                    let diffBox = wrapper.querySelector('.diff-box');
                                    if (!diffBox) {
                                        diffBox = document.createElement('div');
                                        // Floating Tooltip style
                                        diffBox.className = "diff-box diff-tooltip absolute top-[64px] left-1/2 w-max px-5 py-2 bg-slate-800 text-white rounded-xl shadow-xl z-20 font-bold text-lg flex items-center justify-center tracking-widest pointer-events-none";
                                        
                                        // Mũi tên chỉ lên của tooltip
                                        const arrow = document.createElement('div');
                                        arrow.className = "absolute -top-1.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-slate-800 rotate-45";
                                        diffBox.appendChild(arrow);
                                        
                                        const content = document.createElement('div');
                                        content.className = "diff-content relative z-10";
                                        diffBox.appendChild(content);

                                        wrapper.appendChild(diffBox);
                                    }
                                    wrapper.querySelector('.diff-content').innerHTML = generateDiffHtml(val, bestMatch);
                                }
                            } else if (e.key === 'Backspace') {
                                if (e.target.classList.contains('border-rose-400')) {
                                    e.preventDefault();
                                    e.target.value = getHintValue(wordObj.check, idx);
                                    e.target.classList.remove('border-rose-400', 'text-rose-500', 'bg-rose-50', 'focus:border-rose-400');
                                    e.target.classList.add('border-slate-200', 'text-slate-700', 'bg-slate-50', 'focus:border-brand-500');
                                    const diffBox = wrapper.querySelector('.diff-box');
                                    if (diffBox) diffBox.remove();
                                }
                            }
                        };
                        
                        wrapper.appendChild(input);
                        container.appendChild(wrapper);
                    }
                } else {
                    if (wordObj.revealed) {
                        const box = document.createElement('div');
                        box.className = "h-[54px] px-8 bg-brand-50 text-brand-600 font-bold text-xl rounded-full flex items-center justify-center border-2 border-brand-400 shadow-[0_4px_12px_rgba(99,102,241,0.15)] min-w-[120px] cursor-pointer hover:bg-brand-100 transition-all";
                        box.innerText = wordObj.display;
                        box.title = "Chuột trái để ẩn / Chuột phải để nghe";
                        box.onclick = () => {
                            wordObj.revealed = false;
                            renderCard();
                        };
                        box.oncontextmenu = (e) => {
                            e.preventDefault();
                            playTTS(wordObj.check);
                        };
                        container.appendChild(box);
                    } else {
                        const hiddenBox = document.createElement('div');
                        hiddenBox.className = "h-[54px] px-8 bg-slate-50 border-2 border-slate-200 rounded-full text-slate-400 font-bold text-xl select-none cursor-pointer hover:bg-slate-100 hover:text-slate-600 transition-all flex items-center justify-center min-w-[120px] tracking-widest";
                        hiddenBox.innerText = getHintText(wordObj.check, idx);
                        
                        hiddenBox.onclick = () => {
                            wordObj.revealed = true;
                            renderCard();
                        };
                        container.appendChild(hiddenBox);
                    }
                }
            });
        }
        // Global Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            const setupScreen = document.getElementById('setupScreen');
            if (!setupScreen.classList.contains('hidden')) return;
            
            if (e.key === 'Enter') {
                if (synonymsData.length > 0 && synonymsData[currentIndex]) {
                    const current = synonymsData[currentIndex];
                    const allRevealed = current.words.every(w => w.revealed);
                    if (allRevealed) {
                        nextCard();
                    }
                }
            } else if (e.key === 'ArrowRight') {
                if (document.activeElement.tagName !== 'INPUT') {
                    nextCard();
                }
            } else if (e.key === 'ArrowLeft') {
                if (document.activeElement.tagName !== 'INPUT') {
                    prevCard();
                }
            }
        });
        
    </script>
</body>
</html>
